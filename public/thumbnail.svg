    <g transform="rotate(225)"><ellipse cx="0" cy="-18" rx="6" ry="12" fill="#E8A882" opacity="0.8"/></g>
    <g transform="rotate(270)"><ellipse cx="0" cy="-18" rx="6" ry="12" fill="#F2C4B8" opacity="0.8"/></g>
    <g transform="rotate(315)"><ellipse cx="0" cy="-18" rx="6" ry="12" fill="#E8A882" opacity="0.8"/></g>

<svg width="1200" height="630" viewBox="0 0 1200 630" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Wevin — Digital Wedding Invitation</title>
  <desc>Wevin open graph thumbnail with floral minimal design</desc>

  <!-- Background -->

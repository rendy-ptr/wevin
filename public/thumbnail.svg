    <g transform="rotate(0)">  <ellipse cx="0" cy="-68" rx="28" ry="52" fill="#F2C4B8"/></g>
    <g transform="rotate(45)"> <ellipse cx="0" cy="-68" rx="28" ry="52" fill="#E8A882"/></g>
